<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Craft Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1, h2 {
            color: #ffffff;
        }
        input, button {
            padding: 0.75rem;
            margin: 0.5rem;
            border-radius: 0.5rem;
            border: none;
            font-size: 1rem;
        }
        input {
            background-color: #ffffff;
            color: #000000;
            width: calc(100% - 2rem);
        }
        button {
            background-color: #6366f1;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #4f46e5;
        }
        .suggestions {
            margin-top: 1rem;
            text-align: left;
        }
        .suggestion {
            background-color: #0f172a;
            padding: 0.5rem;
            margin: 0.25rem 0;
            border-radius: 0.25rem;
        }
        .viral-attribution {
            font-size: 0.75rem;
            color: #7c8791;
            margin-top: 1rem;
        }
        .paywall {
            text-align: center;
        }
        .paywall button {
            display: block;
            margin: 1rem auto;
        }
        .email-input {
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script>
        const CONFIG = {
            GROQ_KEY: 'CONFIG.GROQ_KEY',
            SUPABASE_ANON_KEY: 'your_supabase_anon_key',
            SUPABASE_URL: 'https://your_supabase_url.supabase.co'
        };

        const { useState } = React;

        const App = () => {
            const [view, setView] = useState('landing');
            const [topic, setTopic] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [uses, setUses] = useState(0);
            const [email, setEmail] = useState('');

            const trackEvent = (eventName) => {
                fetch(`https://app.posthog.com/capture/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        api_key: 'your_posthog_api_key',
                        event: eventName,
                        properties: { distinct_id: 'unique_user_id' }
                    })
                });
            };

            const handleTopicChange = (e) => {
                setTopic(e.target.value);
            };

            const getSubjectSuggestions = async () => {
                if (uses >= 2 && !localStorage.getItem('paidUser')) {
                    setView('paywall');
                    trackEvent('free_limit_hit');
                    trackEvent('paywall_shown');
                    return;
                }

                trackEvent('tool_used');
                setUses(uses + 1);

                const response = await fetch('https://api.groq.com/v1/engines/llama3-70b/embed', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.GROQ_KEY}`
                    },
                    body: JSON.stringify({
                        input: topic,
                        max_tokens: 100
                    })
                });

                const data = await response.json();
                setSuggestions(data.choices.map(choice => choice.text.trim()));
                setView('tool');
            };

            const handleEmailChange = (e) => {
                setEmail(e.target.value);
            };

            const captureEmail = async () => {
                trackEvent('email_captured');

                const supabase = new SupabaseClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
                await supabase.from('leads').insert([{ email, free_uses: 3 }]);

                localStorage.setItem('paidUser', true);
                setView('tool');
            };

            return (
                <div className="container">
                    {view === 'landing' && (
                        <>
                            <h1>Boost Email Opens</h1>
                            <h2>Marketing managers create winning subject lines in seconds</h2>
                            <p>Enter email topic (5 sec) → Get AI suggestions (10 sec) → Increase opens instantly</p>
                            <input type="text" value={topic} onChange={handleTopicChange} placeholder="Enter email topic" />
                            <button onClick={getSubjectSuggestions}>Unlock Better Opens</button>
                        </>
                    )}
                    {view === 'tool' && (
                        <>
                            <h2>Your AI-Generated Subject Lines</h2>
                            <div className="suggestions">
                                {suggestions.map((suggestion, index) => (
                                    <div key={index} className="suggestion">
                                        {suggestion}
                                        <div className="viral-attribution">Generated by Subject Craft Pro — subject-craft-pro.vercel.app</div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setView('landing')}>Try Another Topic</button>
                        </>
                    )}
                    {view === 'paywall' && (
                        <div className="paywall">
                            <h2>Upgrade to Subject Craft Pro</h2>
                            <p>Get unlimited access to AI-powered subject line suggestions.</p>
                            <div className="email-input">
                                <input type="email" value={email} onChange={handleEmailChange} placeholder="Enter your email" />
                                <button onClick={captureEmail}>Get 3 Free Uses</button>
                            </div>
                            <button onClick={() => { trackEvent('payment_clicked'); window.location.href = 'https://buy.stripe.com/placeholder-subject-craft-pro'; }}>Buy $9/mo</button>
                            <button onClick={() => { trackEvent('payment_clicked'); window.location.href = 'https://gumroad.com/l/placeholder-subject-craft-pro'; }}>Buy via Gumroad</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@latest/dist/supabase.min.js"></script>
</body>
</html>
